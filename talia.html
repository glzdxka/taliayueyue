<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>手机划词生图</title>
    <style>
        body { font-family: sans-serif; padding: 20px; padding-bottom: 100px; line-height: 1.6; }
        .box { background: #eee; padding: 15px; border-radius: 10px; margin-top: 20px; }
        
        /* 手机端专用：底部固定按钮，防止被系统菜单挡住 */
        #mobile-gen-btn {
            display: none;
            position: fixed;
            bottom: 20px; left: 50%;
            transform: translateX(-50%);
            background: #007bff;
            color: white;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 9999;
        }

        #result-img { width: 100%; border-radius: 10px; margin-top: 20px; display: none; }
        .status { color: #666; font-size: 14px; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="box">
        <h3>手机测试区</h3>
        <p>长按这段文字选择一个词（比如“一只穿草鞋的兔子”），你会发现屏幕底部出现了一个大的蓝色按钮。</p>
    </div>

    <button id="mobile-gen-btn">✨ 点击为选中文字生图</button>

    <div id="status" class="status"></div>
    <img id="result-img">

    <script>
        const btn = document.getElementById('mobile-gen-btn');
        const img = document.getElementById('result-img');
        const status = document.getElementById('status');
        let selectedText = "";

        // 手机端监听选中
        document.addEventListener('selectionchange', () => {
            const text = window.getSelection().toString().trim();
            if (text.length > 0) {
                selectedText = text;
                btn.style.display = 'block'; // 显示底部按钮
            } else {
                // 为了方便点击，这里加个延迟消失
                setTimeout(() => {
                    if (!window.getSelection().toString()) btn.style.display = 'none';
                }, 2000);
            }
        });

        // 点击底部按钮
        btn.onclick = async () => {
            btn.style.display = 'none';
            status.innerText = "正在翻译并生图中，请稍等...";
            img.style.display = 'none';

            try {
                // 1. 翻译
                const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(selectedText)}&langpair=zh-CN|en`);
                const data = await res.json();
                const en = data.responseData.translatedText;

                // 2. 生成图片地址
                const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(en)}?nologo=true&seed=${Date.now()}`;
                
                // 3. 加载图片
                img.src = url;
                img.onload = () => {
                    status.innerText = "生成成功！";
                    img.style.display = 'block';
                };
            } catch (e) {
                status.innerText = "出错了，请重试";
            }
        };
    </script>
</body>
</html>
